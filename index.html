<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Co-op Tetris Together</title>
    <style>
        body { background: #1a1a24; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        h1 { color: #00f0ff; font-size: 24px; margin-bottom: 5px; }
        #status { color: #ffdd67; margin-bottom: 10px; font-weight: bold; }
        #share-box { background: #252538; padding: 8px; border-radius: 6px; display: inline-block; margin-bottom: 15px; }
        #share-url { color: #00f0ff; font-family: monospace; }
        .game-area { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 10px; }
        canvas { border: 4px solid #3d3d5c; background: #0b0b12; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .controls { margin-top: 15px; color: #aaa; font-size: 14px; background: #252538; padding: 8px 15px; border-radius: 20px; display: inline-block; }
    </style>
</head>
<body>

    <h1>Спільний Ко-оп Тетріс (Одне Поле)</h1>
    <div id="status">Підключення...</div>
    <div id="share-box">Посилання для друга: <span id="share-url"></span></div>
    
    <div class="game-area">
        <canvas id="tetris" width="300" height="600"></canvas>
    </div>

    <div class="controls">🎮 <b>Керування:</b> Стрілки Вліво/Вправо/Вниз. Вгору — поворот фігури.</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, runTransaction } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_l8PXKFOi8xD1-49rZOtsH1I3uYOrwfs",
            authDomain: "monopoliya-dbc97.firebaseapp.com",
            projectId: "monopoliya-dbc97",
            storageBucket: "monopoliya-dbc97.firebasestorage.app",
            messagingSenderId: "939364818613",
            appId: "1:939364818613:web:8082c7b5f81b3dc76328fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room') || Math.random().toString(36).substring(2, 7);
        if (!urlParams.get('room')) window.location.search = `?room=${roomId}`;
        document.getElementById('share-url').innerText = window.location.href;

        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');
        ctx.scale(30, 30); // Розмір блоку 30х30 пкс. Поле 10х20 блоків.

        // Спільна матриця поля (стакан)
        const arena = Array.from({length: 20}, () => Array(10).fill(0));
        
        const pieces = {
            'I': [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]],
            'L': [[0,2,0],[0,2,0],[0,2,2]],
            'O': [[3,3],[3,3]],
            'T': [[0,4,0],[4,4,4],[0,0,0]]
        };

        let playerId = null, opponentId = null;
        let myPiece = { pos: {x: 3, y: 0}, matrix: pieces['T'], color: '#00f0ff' };
        let opponentPiece = { pos: {x: 3, y: 0}, matrix: pieces['T'], color: '#ff007f' };

        // Випадкова фігура
        function getRandomPiece(isP1) {
            const keys = Object.keys(pieces);
            const key = keys[Math.floor(Math.random() * keys.length)];
            return {
                pos: { x: isP1 ? 1 : 6, y: 0 },
                matrix: pieces[key],
                color: isP1 ? '#00f0ff' : '#ff007f'
            };
        }

        // Перевірка зіткнень з підлогою, стінами або іншими блоками
        function collide(arena, piece) {
            const [m, o] = [piece.matrix, piece.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        // Злиття фігури з полем, коли вона впала
        function merge(arena, piece) {
            piece.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + piece.pos.y][x + piece.pos.x] = piece.color;
                    }
                });
            });
        }

        // Очищення ліній
        function arenaSweep() {
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
            }
        }

        function draw() {
            ctx.fillStyle = '#0b0b12';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Малюємо зафіксовані блоки на полі
            arena.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = value;
                        ctx.fillRect(x, y, 1, 1);
                    }
                });
            });

            // Малюємо твою фігуру
            drawMatrix(myPiece.matrix, myPiece.pos, myPiece.color);
            // Малюємо фігуру суперника
            if (opponentPiece) {
                drawMatrix(opponentPiece.matrix, opponentPiece.pos, opponentPiece.color);
            }
        }

        function drawMatrix(matrix, offset, color) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = color;
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function rotate(matrix) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            matrix.forEach(row => row.reverse());
        }

        function playerDrop() {
            myPiece.pos.y++;
            if (collide(arena, myPiece)) {
                myPiece.pos.y--;
                merge(arena, myPiece);
                arenaSweep();
                myPiece = getRandomPiece(playerId === 'p1');
                if (collide(arena, myPiece)) {
                    // Програш — чистимо поле
                    arena.forEach(row => row.fill(0));
                }
                // Оновлюємо поле в базі
                set(ref(db, `rooms/${roomId}/arena`), arena);
            }
            syncState();
        }

        function syncState() {
            if (!playerId) return;
            set(ref(db, `rooms/${roomId}/pieces/${playerId}`), myPiece);
        }

        // Логіка підключення кімнати
        runTransaction(ref(db, `rooms/${roomId}/users`), (curr) => {
            if (!curr) return { p1: true };
            if (!curr.p1) { curr.p1 = true; return curr; }
            if (!curr.p2) { curr.p2 = true; return curr; }
            return;
        }).then((res) => {
            if (!res.committed) {
                document.getElementById('status').innerText = "Кімната заповнена!";
                return;
            }
            const u = res.snapshot.val();
            playerId = u.p2 ? 'p2' : 'p1';
            opponentId = playerId === 'p1' ? 'p2' : 'p1';

            myPiece = getRandomPiece(playerId === 'p1');

            document.getElementById('status').innerText = `Ко-оп Активовано! Ти: ${playerId.toUpperCase()}`;

            onDisconnect(ref(db, `rooms/${roomId}/pieces/${playerId}`)).remove();
            onDisconnect(ref(db, `rooms/${roomId}/users/${playerId}`)).remove();

            // Слухаємо зміни поля від обох гравців
            onValue(ref(db, `rooms/${roomId}/arena`), (snap) => {
                if (snap.exists()) {
                    const data = snap.val();
                    for(let y=0; y<20; y++) {
                        for(let x=0; x<10; x++) arena[y][x] = data[y][x];
                    }
                    draw();
                }
            });

            // Слухаємо рухи фігури суперника
            onValue(ref(db, `rooms/${roomId}/pieces/${opponentId}`), (snap) => {
                if (snap.exists()) {
                    opponentPiece = snap.val();
                    draw();
                }
            });

            // Автоматичне падіння вниз
            setInterval(() => {
                playerDrop();
                draw();
            }, 600);

            // Керування клавішами
            document.addEventListener('keydown', e => {
                if (e.keyCode === 37) { // Вліво
                    myPiece.pos.x--;
                    if (collide(arena, myPiece)) myPiece.pos.x++;
                }
                if (e.keyCode === 39) { // Вправо
                    myPiece.pos.x++;
                    if (collide(arena, myPiece)) myPiece.pos.x--;
                }
                if (e.keyCode === 40) { // Вниз
                    playerDrop();
                }
                if (e.keyCode === 38) { // Вгору (Поворот)
                    rotate(myPiece.matrix);
                    if (collide(arena, myPiece)) rotate(myPiece.matrix); // відміна якщо колізія
                }
                syncState();
                draw();
            });

            syncState();
        });
    </script>
</body>
</html>
