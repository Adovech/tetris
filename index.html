<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer Tanks via Firebase</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: sans-serif; color: #fff; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #00f0ff; }
        #status { color: #ffcc00; font-weight: bold; margin-bottom: 5px; }
        #share-url { color: #00f0ff; font-family: monospace; font-size: 12px; word-break: break-all; }
        .controls-hint { font-size: 12px; color: #aaa; margin-top: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui">
        <h2>3D Танчики Онлайн 🚀</h2>
        <div id="status">Підключення до бази...</div>
        <div>Скинь лінк другу: <span id="share-url"></span></div>
        <div class="controls-hint">⌨️ <b>Керування:</b> Стрілки або WASD — рух. <b>Пробіл</b> — вогонь!</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, runTransaction } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_l8PXKFOi8xD1-49rZOtsH1I3uYOrwfs",
            authDomain: "monopoliya-dbc97.firebaseapp.com",
            projectId: "monopoliya-dbc97",
            storageBucket: "monopoliya-dbc97.firebasestorage.app",
            messagingSenderId: "939364818613",
            appId: "1:939364818613:web:8082c7b5f81b3dc76328fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room') || Math.random().toString(36).substring(2, 7);
        if (!urlParams.get('room')) window.location.search = `?room=${roomId}`;
        document.getElementById('share-url').innerText = window.location.href;

        let playerId = null, opponentId = null;

        // --- НАЛАШТУВАННЯ THREE.JS (3D Світ) ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.03);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Освітлення
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0x00f0ff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Арена (Земля)
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Сітка на підлозі для орієнтації в просторі
        const grid = new THREE.GridHelper(100, 50, 0x00f0ff, 0x222244);
        grid.position.y = 0.01;
        scene.add(grid);

        // Функція створення 3D моделі Танка
        function createTankModel(color) {
            const tankGroup = new THREE.Group();
            
            // Корпус
            const bodyGeo = new THREE.BoxGeometry(2, 0.8, 3);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.4;
            tankGroup.add(body);

            // Башта
            const turretGeo = new THREE.BoxGeometry(1.2, 0.5, 1.2);
            const turret = new THREE.Mesh(turretGeo, bodyMat);
            turret.position.y = 0.85;
            tankGroup.add(turret);

            // Дуло
            const barrelGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.5);
            const barrel = new THREE.Mesh(barrelGeo, new THREE.MeshStandardMaterial({ color: 0x333333 }));
            barrel.rotation.x = Math.PI / 2;
            barrel.position.set(0, 0.85, 1);
            tankGroup.add(barrel);

            scene.add(tankGroup);
            return tankGroup;
        }

        let myTank = null;
        let opponentTank = null;
        let myData = { x: 0, z: 0, rot: 0, fireTrigger: 0 };
        let bullets = [];

        // Клавіші керування
        const keys = { w: false, s: false, a: false, d: false };
        document.addEventListener('keydown', e => {
            if (e.key === 'w' || e.key === 'ArrowUp') keys.w = true;
            if (e.key === 's' || e.key === 'ArrowDown') keys.s = true;
            if (e.key === 'a' || e.key === 'ArrowLeft') keys.a = true;
            if (e.key === 'd' || e.key === 'ArrowRight') keys.d = true;
            if (e.key === ' ') fireBullet(myTank, true); // Пробіл — стріляти
        });
        document.addEventListener('keyup', e => {
            if (e.key === 'w' || e.key === 'ArrowUp') keys.w = false;
            if (e.key === 's' || e.key === 'ArrowDown') keys.s = false;
            if (e.key === 'a' || e.key === 'ArrowLeft') keys.a = false;
            if (e.key === 'd' || e.key === 'ArrowRight') keys.d = false;
        });

        // Створення кулі
        function fireBullet(tank, isMine) {
            if (!tank) return;
            const bulletGeo = new THREE.SphereGeometry(0.2, 8, 8);
            const bulletMat = new THREE.MeshBasicMaterial({ color: isMine ? 0x00ff00 : 0xff0000 });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            
            bullet.position.copy(tank.position);
            bullet.position.y = 0.85; // Висота дула
            
            // Вектор напрямку кулі на основі кута танка
            bullet.userData = {
                vx: Math.sin(tank.rotation.y) * 0.5,
                vz: Math.cos(tank.rotation.y) * 0.5,
                life: 60 // Існує 60 кадрів
            };

            scene.add(bullet);
            bullets.push(bullet);

            if (isMine) {
                myData.fireTrigger = Math.random(); // Змінюємо трігер для бази даних
                syncToFirebase();
            }
        }

        // --- ПІДКЛЮЧЕННЯ FIREBASE МУЛЬТИПЛЕЄРУ ---
        runTransaction(ref(db, `rooms/${roomId}/users`), (curr) => {
            if (!curr) return { p1: true };
            if (!curr.p1) { curr.p1 = true; return curr; }
            if (!curr.p2) { curr.p2 = true; return curr; }
            return;
        }).then((res) => {
            if (!res.committed) {
                document.getElementById('status').innerText = "Кімната заповнена!";
                return;
            }
            const u = res.snapshot.val();
            playerId = u.p2 ? 'p2' : 'p1';
            opponentId = playerId === 'p1' ? 'p2' : 'p1';

            document.getElementById('status').innerText = `Ти у грі! Юніт: ${playerId.toUpperCase()}`;

            // Створюємо 3D танки (Твій — синій, ворог — червоний)
            myTank = createTankModel(0x00aaff);
            opponentTank = createTankModel(0xff2222);

            // Стартові позиції, щоб не з'явитися в одній точці
            if (playerId === 'p1') { myTank.position.set(-10, 0, 0); } 
            else { myTank.position.set(10, 0, 0); }

            onDisconnect(ref(db, `rooms/${roomId}/users/${playerId}`)).remove();
            onDisconnect(ref(db, `rooms/${roomId}/tanks/${playerId}`)).remove();

            // Слухаємо координати та дії суперника
            let lastFireTrigger = 0;
            onValue(ref(db, `rooms/${roomId}/tanks/${opponentId}`), (snap) => {
                if (snap.exists() && opponentTank) {
                    const data = snap.val();
                    opponentTank.position.x = data.x;
                    opponentTank.position.z = data.z;
                    opponentTank.rotation.y = data.rot;
                    
                    // Якщо ворог вистрілив (трігер змінився) — малюємо його кулю у нашому вікні
                    if (data.fireTrigger && data.fireTrigger !== lastFireTrigger) {
                        fireBullet(opponentTank, false);
                        lastFireTrigger = data.fireTrigger;
                    }
                }
            });

            // Старт головного циклу гри
            animate();
        });

        function syncToFirebase() {
            if (!myTank || !playerId) return;
            set(ref(db, `rooms/${roomId}/tanks/${playerId}`), {
                x: myTank.position.x,
                z: myTank.position.z,
                rot: myTank.rotation.y,
                fireTrigger: myData.fireTrigger
            });
        }

        // --- ГОЛОВНИЙ ЦИКЛ РЕНДЕРУ (60 FPS) ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Логіка руху твого танка
            if (myTank) {
                let moved = false;
                if (keys.w) {
                    myTank.position.x += Math.sin(myTank.rotation.y) * 0.15;
                    myTank.position.z += Math.cos(myTank.rotation.y) * 0.15;
                    moved = true;
                }
                if (keys.s) {
                    myTank.position.x -= Math.sin(myTank.rotation.y) * 0.15;
                    myTank.position.z -= Math.cos(myTank.rotation.y) * 0.15;
                    moved = true;
                }
                if (keys.a) {
                    myTank.rotation.y += 0.05;
                    moved = true;
                }
                if (keys.d) {
                    myTank.rotation.y -= 0.05;
                    moved = true;
                }

                if (moved) syncToFirebase();

                // Камера слідує за твоїм танком зверху-позаду
                camera.position.set(myTank.position.x - Math.sin(myTank.rotation.y) * 12, 8, myTank.position.z - Math.cos(myTank.rotation.y) * 12);
                camera.lookAt(myTank.position.x, myTank.position.y + 1, myTank.position.z);
            }

            // 2. Логіка польоту куль
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.x += b.userData.vx;
                b.position.z += b.userData.vz;
                b.userData.life--;

                if (b.userData.life <= 0) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // Адаптація під розмір екрану
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
