<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tricky Towers Clone Co-op</title>
    <style>
        body { background: #14141f; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; overflow-x: hidden; }
        h1 { color: #00ffcc; margin: 5px 0; font-size: 24px; text-shadow: 0 0 10px rgba(0,255,204,0.3); }
        #status { color: #ffcc00; font-weight: bold; margin-bottom: 5px; }
        #share-box { background: #222235; padding: 8px; border-radius: 6px; display: inline-block; margin-bottom: 15px; border: 1px solid #333350; }
        #share-url { color: #00ffcc; font-family: monospace; font-size: 14px; }
        .game-container { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .player-board { background: #1c1c2d; padding: 10px; border-radius: 12px; border: 2px solid #2d2d44; }
        .canvas-container { position: relative; width: 320px; height: 550px; background: #0d0d18; border-radius: 6px; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; }
        .controls-info { margin-top: 15px; font-size: 13px; color: #aaa; background: #1c1c2d; padding: 8px 20px; border-radius: 20px; display: inline-block; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
</head>
<body>

    <h1>Tricky Вежі Онлайн (Co-op Фізика)</h1>
    <div id="status">Підключення...</div>
    <div id="share-box">Посилай другу: <span id="share-url"></span></div>

    <div class="game-container">
        <div class="player-board">
            <h3 id="local-title">Ти</h3>
            <div id="canvas-local" class="canvas-container"></div>
        </div>
        <div class="player-board">
            <h3 id="remote-title">Очікування суперника...</h3>
            <div id="canvas-remote" class="canvas-container"></div>
        </div>
    </div>

    <div class="controls-info">🕹️ <b>Керування:</b> Стрілки Вліво / Вправо. Стрілка "Вгору" — крутити блок. <b>Пробіл</b> — різко кинути вниз (Drop).</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect, runTransaction } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_l8PXKFOi8xD1-49rZOtsH1I3uYOrwfs",
            authDomain: "monopoliya-dbc97.firebaseapp.com",
            projectId: "monopoliya-dbc97",
            storageBucket: "monopoliya-dbc97.firebasestorage.app",
            messagingSenderId: "939364818613",
            appId: "1:939364818613:web:8082c7b5f81b3dc76328fc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room') || Math.random().toString(36).substring(2, 7);
        if (!urlParams.get('room')) window.location.search = `?room=${roomId}`;
        document.getElementById('share-url').innerText = window.location.href;

        let playerId = null, opponentId = null;
        
        // Модулі Matter.js
        const { Engine, Render, Runner, Bodies, Composite, Body } = Matter;

        // Конфігурація світів
        const GAME_WIDTH = 320;
        const GAME_HEIGHT = 550;

        function createPhysicsWorld(elementId, isLocal) {
            const engine = Engine.create({ gravity: { y: 1.2 } }); // Реалістична гравітація
            const render = Render.create({
                element: document.getElementById(elementId),
                engine: engine,
                options: { width: GAME_WIDTH, height: GAME_HEIGHT, wireframes: false, background: '#0d0d18' }
            });

            // Платформа-основа (як в Tricky Towers, на яку ставимо вежу)
            const platform = Bodies.rectangle(GAME_WIDTH / 2, GAME_HEIGHT - 40, 140, 20, { 
                isStatic: true, 
                render: { fillStyle: '#ffcc00' } 
            });
            Composite.add(engine.world, platform);

            Render.run(render);
            const runner = Runner.create();
            Runner.run(runner, engine);

            return { engine, platform };
        }

        const localWorld = createPhysicsWorld('canvas-local', true);
        const remoteWorld = createPhysicsWorld('canvas-remote', false);

        let currentControlledBody = null;
        const blockColors = ['#ff0055', '#00ffcc', '#9900ff', '#ffaa00', '#00ff55'];

        // Створення нового падаючого блоку
        function spawnBlock() {
            const x = GAME_WIDTH / 2;
            const y = 50;
            const types = ['I', 'O', 'T', 'L'];
            const type = types[Math.floor(Math.random() * types.length)];
            let body;

            const color = blockColors[Math.floor(Math.random() * blockColors.length)];

            if (type === 'I') body = Bodies.rectangle(x, y, 120, 30, { render: { fillStyle: color } });
            else if (type === 'O') body = Bodies.rectangle(x, y, 60, 60, { render: { fillStyle: color } });
            else if (type === 'T') {
                body = Bodies.fromVertices(x, y, [[{x:0,y:0},{x:90,y:0},{x:90,y:30},{x:60,y:30},{x:60,y:60},{x:30,y:60},{x:30,y:30},{x:0,y:30}]], { render: { fillStyle: color } });
            } else {
                body = Bodies.rectangle(x, y, 40, 40, { render: { fillStyle: color } });
            }

            // Поки ми керуємо блоком, вимикаємо для нього гравітацію і колізії, щоб він вільно рухався вгорі
            Body.setStatic(body, true);
            Composite.add(localWorld.engine.world, body);
            currentControlledBody = body;
        }

        // Перетворення масиву тіл для відправки в Firebase (тільки потрібні координати та кути)
        function syncWorldToFirebase() {
            if (!playerId) return;
            const bodies = Composite.allBodies(localWorld.engine.world);
            const syncData = bodies.map(b => {
                return {
                    x: b.position.x,
                    y: b.position.y,
                    angle: b.angle,
                    width: b.bounds.max.x - b.bounds.min.x,
                    height: b.bounds.max.y - b.bounds.min.y,
                    isStatic: b.isStatic,
                    color: b.render.fillStyle
                };
            });
            set(ref(db, `rooms/${roomId}/${playerId}`), syncData);
        }

        // Візуалізація світу суперника на основі його даних з Firebase
        function renderRemoteWorld(data) {
            // Очищаємо всі старі динамічні блоки суперника (крім статичної платформи)
            const allRemoteBodies = Composite.allBodies(remoteWorld.engine.world);
            allRemoteBodies.forEach(b => {
                if (!b.isStatic) Composite.remove(remoteWorld.engine.world, b);
            });

            // Малюємо нові блоки суперника
            data.forEach(bData => {
                if (bData.isStatic && bData.y > GAME_HEIGHT - 60) return; // Пропускаємо основу, вона вже є
                const newBody = Bodies.rectangle(bData.x, bData.y, bData.width, bData.height, {
                    isStatic: bData.isStatic,
                    angle: bData.angle,
                    render: { fillStyle: bData.color || '#ff007f' }
                });
                Composite.add(remoteWorld.engine.world, newBody);
            });
        }

        // Логіка підключення кімнати
        runTransaction(ref(db, `rooms/${roomId}/users`), (curr) => {
            if (!curr) return { p1: true };
            if (!curr.p1) { curr.p1 = true; return curr; }
            if (!curr.p2) { curr.p2 = true; return curr; }
            return;
        }).then((res) => {
            if (!res.committed) {
                document.getElementById('status').innerText = "Кімната заповнена!";
                return;
            }
            const u = res.snapshot.val();
            playerId = u.p2 ? 'p2' : 'p1';
            opponentId = playerId === 'p1' ? 'p2' : 'p1';

            document.getElementById('status').innerText = `Граємо! Кімната: ${roomId} | Ти: ${playerId.toUpperCase()}`;
            document.getElementById('local-title').innerText = `Твоя Вежа (${playerId.toUpperCase()})`;
            document.getElementById('remote-title').innerText = `Вежа суперника (${opponentId.toUpperCase()})`;

            onDisconnect(ref(db, `rooms/${roomId}/${playerId}`)).remove();
            onDisconnect(ref(db, `rooms/${roomId}/users/${playerId}`)).remove();

            // Слухаємо суперника
            onValue(ref(db, `rooms/${roomId}/${opponentId}`), (snap) => {
                if (snap.exists()) renderRemoteWorld(snap.val());
            });

            // Старт гри
            spawnBlock();

            // Керування
            document.addEventListener('keydown', e => {
                if (!currentControlledBody) return;

                if (e.keyCode === 37) { // Вліво
                    Body.setPosition(currentControlledBody, { x: currentControlledBody.position.x - 20, y: currentControlledBody.position.y });
                }
                if (e.keyCode === 39) { // Вправо
                    Body.setPosition(currentControlledBody, { x: currentControlledBody.position.x + 20, y: currentControlledBody.position.y });
                }
                if (e.keyCode === 38) { // Вгору (Поворот)
                    Body.setAngle(currentControlledBody, currentControlledBody.angle + Math.PI / 4);
                }
                if (e.keyCode === 32) { // ПРОБІЛ — відпустити у вільне падіння з фізикою
                    Body.setStatic(currentControlledBody, false);
                    currentControlledBody = null;
                    
                    // Через секунду спавнимо наступний блок
                    setTimeout(() => {
                        spawnBlock();
                    }, 1200);
                }
                syncWorldToFirebase();
            });

            // Постійний стрім фізики в базу (балансування вежі)
            setInterval(() => {
                syncWorldToFirebase();
            }, 100);
        });
    </script>
</body>
</html>
